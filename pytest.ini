[pytest]
markers =
  cfg_overrides
filterwarnings =
  error
  ignore::ResourceWarning
  default::DeprecationWarning
  ignore:The value of the smallest subnormal for <class 'numpy.float(32|64)'> type is zero.:UserWarning:numpy
  ignore:Trying to partition 1 samples over 1 canonical nodes.:UserWarning
  ignore:Deprecated call to `pkg_resources\.declare_namespace\('.*'\):DeprecationWarning
  ignore:pkg_resources is deprecated as an API:DeprecationWarning
  ignore:Can't initialize NVML:UserWarning:torch
  ignore:The default weight initialization of inception_v3 will be changed in future releases of torchvision.:FutureWarning:torchvision
  ignore::UserWarning:lightning
testpaths = 
  tests
addopts =
  --ignore=tests/data
  --ignore=tests/results