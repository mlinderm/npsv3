[build-system]
requires = [
  "setuptools>=61",
  "wheel",
  "cmake>=3.12",
]
build-backend = "setuptools.build_meta"

[project]
name = "npsv3"
dynamic = ["version"]
description = ''
readme = "README.md"
requires-python = ">=3.11"
license = {text ="MIT"}
keywords = []
authors = [
  { name = "Michael Linderman", email = "mlinderman@middlebury.edu" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = [
  "hydra-core>=1.2",
  "portalocker",
  "ray>=1.2.0",
  "tqdm",
  "numpy>=1.14",
  "pandas>=1.3",
  "scipy>=1.2.0",
  "intervaltree",
  "pysam>=0.16",
  "pybedtools",
  "whatshap",
  "Pillow",
  "webdataset>=0.2.100",
  "torch",
  "torchvision",
  "lightning",
  "torchmetrics",
  "transformers"
]

[project.urls]
Documentation = "https://github.com/mlinderm/npsv3#readme"
Issues = "https://github.com/mlinderm/npsv3/issues"
Source = "https://github.com/mlinderm/npsv3"

[project.scripts]
npsv3 = "npsv3.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"npsv3.conf" = ["**/*.yaml"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.version]
path = "src/npsv3/__about__.py"

[tool.hatch.envs.types]
extra-dependencies = [
  "mypy>=1.0.0",
]
[tool.hatch.envs.types.scripts]
check = "mypy --install-types --non-interactive {args:src/npsv3 tests}"

[tool.hatch.envs.hatch-test]
installer = "pip"

[tool.hatch.envs.hatch-static-analysis]
dependencies = ["ruff==0.11.2"]
installer = "pip"
config-path = "ruff_defaults.toml"

[tool.coverage.run]
source_pkgs = ["npsv3", "tests"]
branch = true
parallel = true
omit = [
  "src/npsv3/__about__.py",
]

[tool.coverage.paths]
npsv3 = ["src/npsv3", "*/npsv3/src/npsv3"]
tests = ["tests", "*/npsv3/tests"]

[tool.coverage.report]
exclude_lines = [
  "no cov",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]

[tool.ruff]
extend = "ruff_defaults.toml"
extend-exclude = ["lib"]

[tool.ruff.lint]
# Don't flag `import lightning as L` or similar conventions
extend-ignore = ["N812"] 

[tool.ruff.lint.extend-per-file-ignores]
"**/tests/**/*" = ["SLF001"]

