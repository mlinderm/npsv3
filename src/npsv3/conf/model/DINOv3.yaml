_target_: npsv3.models.paired.PackedVariant
encoder:
  _target_: npsv3.models.paired.DINOv3Encoder
  # checkpoint_path: null
metric:
  _target_: torch.nn.CosineSimilarity
loss:
  _target_: npsv3.models.paired.InfoNCE
optimizer:
  _target_: timm.optim.create_optimizer_v2
  _partial_: true
  opt: "adamw"
  lr: 0.001
  betas: [0.9, 0.999]
  weight_decay: 0.01
scheduler:
  _target_: timm.scheduler.cosine_lr.CosineLRScheduler
  _partial_: true
  lr_min: 0.00001
  t_initial: 5
  cycle_limit: 1
  warmup_t: 5
  warmup_lr_init: 0.0001
  warmup_prefix: true
predictor:
  _target_: npsv3.models.paired.MaximizingPredictor
