_target_: npsv3.models.paired.PackedVariant
encoder:
  _target_: npsv3.models.paired.ViTEncoder
  num_channels: ${len:${pileup.image_channels}}
  projection_size: 512
  pretrained_path: null
metric:
  _target_: torch.nn.CosineSimilarity
loss:
  _target_: npsv3.models.paired.InfoNCE
optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.001
  betas: [0.9, 0.999]
  eps: 1e-8
  weight_decay: 0.01
predictor:
  _target_: npsv3.models.paired.MaximizingPredictor
