_target_: npsv3.models.paired.PackedVariant
encoder:
  _target_: npsv3.models.paired.InceptionEncoder
  num_channels: ${len:${pileup.image_channels}}
  projection_size: 512
metric:
  _target_: npsv3.models.paired.EuclideanDistanceMetric
loss:
  _target_: npsv3.models.paired.ContrastiveLoss
  margin: 1.0
optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.001
predictor:
  _target_: npsv3.models.paired.MinimizingPredictor
